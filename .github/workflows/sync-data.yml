name: Sync BSData

on:
  schedule:
    # Every Monday at 06:00 UTC — checks for BSData updates weekly
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Also runnable manually from the GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run parser
        run: node scripts/parse-bsdata.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/ship_database.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ship_database.json data/sync_log.json
          git commit -m "chore: sync BSData $(date -u +%Y-%m-%d)"
          git push
